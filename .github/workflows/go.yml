name: Go
on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  test:
    runs-on: ${{ matrix.os }}
    env:
      HOST: localhost
      DBPORT: 5432
      USER: root
      PASSWORD: root
      DBNAME: root

    strategy:
      matrix:
        go-version: ["1.22", "1.23"]
        os:
          - ubuntu-latest
          - ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Start database
        run: docker compose up -d

      - name: Wait for Postgres
        run: |
          until docker compose exec -T postgres pg_isready -U root
          do
            echo "Waiting for postgres.."
            sleep 2
          done

      - name: Run tests
        env:
          DB_HOST: localhost
        run: go test -v ./...

      - name: Stop database
        if: always()
        run: docker compose down -v

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Build
        run: go build -v -o main .
      
      - name: Upload a build artifact
        uses: actions/upload-artifact@v4
        with:
          name: programa
          path: main

  docker:
    needs: build
    uses: ./.github/workflows/Docker.yml
    secrets: inherit

  
  deploy_ec2:
    needs: build
    uses: ./.github/workflows/ec2.yml
    secrets: inherit