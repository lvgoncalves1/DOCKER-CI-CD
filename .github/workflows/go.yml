name: Go
on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  test:
    runs-on: ${{ matrix.os }}
    env:
      HOST: localhost
      PORT: 5432
      USER: root
      PASSWORD: root
      DBNAME: root

    strategy:
      matrix:
        go-version: ["1.22", "1.23"]
        os:
          - ubuntu-latest
          - ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Start database
        run: docker compose up -d

      - name: Wait for Postgres
        run: |
          until docker compose exec -T postgres pg_isready -U root
          do
            echo "Waiting for postgres.."
            sleep 2
          done

      - name: Run tests
        env:
          DB_HOST: localhost
        run: go test -v ./...

      - name: Stop database
        if: always()
        run: docker compose down -v

  build:
    needs: test
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Build
        run: go build -v .

  docker:
    needs: build
    uses: ./.github/workflows/Docker.yml
    secrets: inherit
